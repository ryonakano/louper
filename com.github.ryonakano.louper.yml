id: com.github.ryonakano.louper
runtime: io.elementary.Platform
runtime-version: '8.1'
sdk: io.elementary.Sdk
command: com.github.ryonakano.louper
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
modules:
  - name: blueprint-compiler
    buildsystem: meson
    cleanup:
      - '*'
    sources:
      - type: git
        url: https://gitlab.gnome.org/GNOME/blueprint-compiler.git
        tag: v0.22.2
        commit: ed35ac74de0c1bb1f5e852410b97edd1f08904c9
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$

  - name: louper
    buildsystem: meson
    sources:
      - type: dir
        path: .
