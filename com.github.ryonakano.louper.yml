id: com.github.ryonakano.louper
runtime: io.elementary.Platform
runtime-version: '8.1'
sdk: io.elementary.Sdk
command: louper
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
modules:
  - name: blueprint-compiler
    buildsystem: meson
    cleanup:
      - '*'
    sources:
      - type: git
        url: https://gitlab.gnome.org/GNOME/blueprint-compiler.git
        tag: v0.20.4
        commit: 31b62c24a72c1670d2d93dcdf2d130f1ae12778e
        x-checker-data:
          type: git
          tag-pattern: ^v([\d.]+)$

  - name: louper
    buildsystem: meson
    sources:
      - type: dir
        path: .
